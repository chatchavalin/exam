          <button class="btn" onclick="vcAddOxford('A1')">A1 \u00b7 ${_oxN('A1')}/${OXFORD3000.A1.length}</button>
          <button class="btn" onclick="vcAddOxford('A2')">A2 \u00b7 ${_oxN('A2')}/${OXFORD3000.A2.length}</button>
          <button class="btn" onclick="vcAddOxford('B1')">B1 \u00b7 ${_oxN('B1')}/${OXFORD3000.B1.length}</button>
          <button class="btn" onclick="vcAddOxford('B2')">B2 \u00b7 ${_oxN('B2')}/${OXFORD3000.B2.length}</button>
        </div>
        <div id="vc-ox-stat" style="font-size:12px;color:var(--muted);margin-top:8px"></div>
      </div>
      <div class="sectiontitle">My words (${words.length})</div>
      ${words.length?`<div class="tile"><div style="font-size:12px;color:var(--muted);margin-bottom:8px">Choose level(s) to test \u2014 tap to include or exclude:</div><div class="themebtns" id="vc-levels">${lvPresent.map(l=>`<button class="on" data-lv="${l}" onclick="vcToggleLv(this)">${l==="?"?"Other":l} ${lvCnt[l]}</button>`).join("")}</div><button class="btn primary" style="width:100%;margin-top:12px" onclick="vcStartRound()">Start a round \u2192</button><div style="font-size:12px;color:var(--muted);margin-top:8px;text-align:center">Warm up on up to 20 random words from your selected levels, then test yourself.</div>${unleveled?`<button class="btn sm ghost" style="width:100%;margin-top:10px" onclick="vcSortUnleveled()">\u2728 Sort ${unleveled} unleveled word(s) by CEFR</button><div id="vc-sort-stat" style="font-size:12px;color:var(--muted);margin-top:4px;text-align:center"></div>`:""}</div>`:`<div class="empty">No words yet \u2014 add some above to get started.</div>`}
      <div id="vc-list">${words.map(w=>`<div class="listitem"><div class="grow"><div class="t">${esc(w.en)}</div><div class="s">${esc(w.th)}</div></div><button class="btn sm danger" onclick="vcDelete('${w.id}')">✕</button></div>`).join("")}</div>`;
  }
  async function vcAdd(){
    const set=t=>{const s=$("vc-stat"); if(s)s.textContent=t;};
    const raw=$("vc-text").value; const img=$("vc-img").files[0];
    const lines=(raw||"").split("\n").map(l=>l.trim()).filter(Boolean);
    const pairs=[], enOnly=[];
    for(const ln of lines){ const mm=ln.match(/^(.+?)\s*(?:=|\t|:| - | — )\s*(.+)$/); if(mm && mm[2].trim()){ pairs.push({en:mm[1].trim(),th:mm[2].trim()}); } else { enOnly.push(ln); } }
    let aiErr="";
    const enNeed=[];
    for(const w of enOnly){ const th=OXTHAI[w.toLowerCase()]; if(th){ pairs.push({en:w,th}); } else { enNeed.push(w); } }
    if(enNeed.length||img){ set("Asking AI for Thai…"); try{ pairs.push(...await vcAiPairs(enNeed,img)); }catch(e){ aiErr=e.message||String(e); } }
    const good=pairs.filter(p=>p.en&&p.th);
    if(!good.length){ set(aiErr?("Couldn't translate: "+aiErr):"Nothing to add — type some words or pick an image."); return; }
    let lvMap={}; good.forEach(p=>{ const lv=OXLEVEL[(p.en||"").toLowerCase()]; if(lv) lvMap[(p.en||"").toLowerCase()]=lv; }); const _cls=good.map(p=>p.en).filter(en=>!OXLEVEL[(en||"").toLowerCase()]); if(_cls.length){ try{ set("Sorting by CEFR level…"); Object.assign(lvMap, await vcClassify(_cls)); }catch(_){} }
    try{ set("Saving "+good.length+" word(s)…"); const vid=await vocabSubjectId();
      const r=await client.from("questions").insert(good.map(p=>({subject_id:vid,subtopic_id:null,grade:(lvMap[(p.en||"").toLowerCase()]||null),type:"written",answer_mode:"single",stem:p.en,answer_text:p.th,created_by:me.id, owner_id:state.bankOwner}))); if(r.error) throw r.error;
      viewVocab($("view"));
    }catch(e){ set("Save failed: "+(e.message||e)); }
  }
  async function vcDelete(id){ try{ await client.from("questions").delete().eq("id",id); }catch(e){} viewVocab($("view")); }
  let _oxBusy=false;
  async function vcAddOxford(level){
    if(_oxBusy) return;
    const list=OXFORD3000[level]||[]; if(!list.length) return;
    const set=t=>{const el=$("vc-ox-stat"); if(el)el.textContent=t;};
    const have=new Set((vocabWords||[]).map(w=>(w.en||"").trim().toLowerCase()));
    const todo=list.filter(p=>!have.has(p[0].toLowerCase()));
    if(!todo.length){ set(level+": all "+list.length+" words already added \ud83c\udf89"); return; }
    _oxBusy=true;
    try{
      const thMap={}; const need=[];
      todo.forEach(p=>{ if(p[1]) thMap[p[0].toLowerCase()]=p[1]; else need.push(p[0]); });
      for(let i=0;i<need.length;i+=25){
        const b=need.slice(i,i+25);
        set("Translating "+level+" "+(i+1)+"\u2013"+Math.min(i+25,need.length)+" of "+need.length+"\u2026");
        const prompt="Translate each English word to natural Thai. Return ONLY a JSON array like [{\"en\":\"...\",\"th\":\"...\"}] in the same order. Words:\n"+b.join("\n");
        vcParsePairs(await aiTextCall(prompt)).forEach(x=>{ if(x.en&&x.th) thMap[x.en.toLowerCase()]=x.th; });
      }
      const rows=todo.map(p=>({en:p[0],th:thMap[p[0].toLowerCase()]||""})).filter(r=>r.th);
      if(!rows.length){ _oxBusy=false; set("Couldn\u2019t prepare translations \u2014 check your AI key in You \u2192 AI auto-import."); return; }
      const vid=await vocabSubjectId();
      set("Adding "+rows.length+" "+level+" words\u2026");
      for(let i=0;i<rows.length;i+=200){
        const chunk=rows.slice(i,i+200);
        const r=await client.from("questions").insert(chunk.map(x=>({subject_id:vid,subtopic_id:null,grade:level,type:"written",answer_mode:"single",stem:x.en,answer_text:x.th,created_by:me.id,owner_id:state.bankOwner}))); if(r.error) throw r.error;
      }
      _oxBusy=false; await viewVocab($("view"));
      const el=$("vc-ox-stat"); if(el) el.textContent="Added "+rows.length+" "+level+" words.";
    }catch(e){ _oxBusy=false; set("Failed: "+(e.message||e)); }
  }
  function vcToggleLv(btn){ const lv=btn.getAttribute("data-lv"); if(vocabLevelSel.has(lv)){ if(vocabLevelSel.size<=1) return; vocabLevelSel.delete(lv); btn.classList.remove("on"); } else { vocabLevelSel.add(lv); btn.classList.add("on"); } }
  function vcPool(){ const sel=(vocabLevelSel&&vocabLevelSel.size)?vocabLevelSel:null; return (vocabWords||[]).filter(w=>!sel||sel.has(w.lv||"?")); }
  function vcStartRound(){ const pool=vcPool(); if(!pool.length){ alert("No words in the selected level(s)."); return; } const studied=shuffle(pool).slice(0,Math.min(20,pool.length)); vocabState={studied}; renderVocabStudy(); }
  async function vcSortUnleveled(){
    const set=t=>{const el=$("vc-sort-stat"); if(el)el.textContent=t;};
    const un=(vocabWords||[]).filter(w=>!w.lv); if(!un.length) return;
    set("Sorting "+un.length+" word(s) by CEFR\u2026");
    try{
      const map=await vcClassify(un.map(w=>w.en));
      const byLv={}; un.forEach(w=>{ const lv=map[(w.en||"").toLowerCase()]; if(lv){ (byLv[lv]=byLv[lv]||[]).push(w.id); } });
      const lvs=Object.keys(byLv); if(!lvs.length){ set("Couldn\u2019t classify \u2014 check your AI key in You \u2192 AI auto-import."); return; }
      for(const lv of lvs){ const r=await client.from("questions").update({grade:lv}).in("id",byLv[lv]); if(r.error) throw r.error; }
      await viewVocab($("view"));
    }catch(e){ set("Failed: "+(e.message||e)); }
  }
  function renderVocabStudy(){ const ws=vocabState.studied; $("title").textContent="Warm-up"; $("view").innerHTML=`
      <button class="btn sm ghost" onclick="go('vocab')">← Back</button>
      <div class="sectiontitle">Read these ${ws.length} words</div>
      <div class="tile">${ws.map(w=>`<div class="listitem"><div class="grow"><div class="t">${esc(w.en)}</div><div class="s">${esc(w.th)}</div></div></div>`).join("")}</div>
      <button class="btn primary" style="width:100%;margin-top:6px" onclick="vcReady()">I'm ready →</button>`; }
  function vcReady(){ const max=vocabState.studied.length; let opts=[10,15,20].filter(n=>n<=max); if(!opts.length) opts=[max]; $("title").textContent="Choose length"; $("view").innerHTML=`
      <button class="btn sm ghost" onclick="renderVocabStudy()">← Re-read</button>
      <div class="sectiontitle">How many to test?</div>
      <div class="tile"><div style="display:grid;grid-template-columns:repeat(${opts.length},1fr);gap:8px">${opts.map(n=>`<button class="btn primary" onclick="vcChoose(${n})">${n}</button>`).join("")}</div><div style="font-size:12px;color:var(--muted);margin-top:10px;text-align:center">From the ${max} words you just read.</div></div>`; }
  function vcChoose(n){ vocabState.items=shuffle(vocabState.studied).slice(0,n).map(w=>({w,revealed:false,known:null})); vocabState.idx=0; vocabState.startedAt=Date.now(); $("nav").style.display="none"; renderVocabCard(); }
  function renderVocabCard(){ const it=vocabState.items[vocabState.idx], n=vocabState.items.length; $("title").textContent="Vocab test"; $("view").innerHTML=`
      <div class="qhead"><button class="btn sm" onclick="exitVocab()">✕</button><div class="prog">${vocabState.idx+1} / ${n}</div><div></div><div></div></div>
      <div style="height:4px;background:var(--line);border-radius:3px;overflow:hidden;margin:2px 0 14px"><div style="height:100%;width:${Math.round((vocabState.idx+1)/n*100)}%;background:var(--accent)"></div></div>
      <div class="tile" style="text-align:center;padding:36px 18px;min-height:130px">
        <div style="font-family:var(--fd);font-weight:700;font-size:27px">${esc(it.w.en)}</div>
        ${it.revealed?`<div style="font-size:21px;color:var(--accent);margin-top:18px">${esc(it.w.th)}</div>`:`<button class="btn" style="margin-top:20px" onclick="vcReveal()">Show Thai</button>`}
      </div>
      ${it.revealed?`<div class="row" style="margin-top:10px"><button class="btn danger" style="flex:1" onclick="vcMark(false)">Didn't know</button><button class="btn primary" style="flex:1;background:var(--ok);border-color:var(--ok)" onclick="vcMark(true)">Knew it</button></div>`:``}`; }
  function vcReveal(){ vocabState.items[vocabState.idx].revealed=true; renderVocabCard(); }
  function vcMark(known){ vocabState.items[vocabState.idx].known=known; if(vocabState.idx<vocabState.items.length-1){ vocabState.idx++; renderVocabCard(); } else vcFinish(); }
  async function vcFinish(){
    const items=vocabState.items; const total=items.length, correct=items.filter(i=>i.known).length;
    let vid=null; try{ vid=await vocabSubjectId(); }catch(e){}
    const duration=Math.round((Date.now()-vocabState.startedAt)/1000);
    try{ const {data:att,error}=await client.from("attempts").insert({mode:"vocab",total,correct,score:correct,duration_sec:duration,user_id:me.id}).select("id").single();
      if(!error&&att) await client.from("answers").insert(items.map(i=>({attempt_id:att.id,question_id:i.w.id,subject_id:vid,subtopic_id:null,chosen:null,written_text:null,is_correct:!!i.known,self_graded:true,time_sec:0,user_id:me.id}))); }catch(e){}
    try{ tgSendReport("vocab",{ total, correct, items: items.map(i=>({q:{subject_id:vid,type:"written",answer_text:i.w.th,stem:i.w.en},choices:[],a:{correct:!!i.known,self_graded:true}})) }); }catch(e){}
    const pct=Math.round(correct/total*100), missed=items.filter(i=>!i.known);
    vocabState=null; $("nav").style.display="flex"; state.route="quiz"; $("title").textContent="Vocab results";
    $("view").innerHTML=`
      <div class="tile" style="text-align:center"><div style="font-family:var(--fd);font-size:46px;font-weight:700;color:${perfColor(pct)}">${pct}%</div><div style="color:var(--muted)">${correct} of ${total} known</div></div>
      ${missed.length?`<div class="sectiontitle">Review these</div><div class="tile">${missed.map(i=>`<div class="listitem"><div class="grow"><div class="t">${esc(i.w.en)}</div><div class="s">${esc(i.w.th)}</div></div></div>`).join("")}</div>`:`<div class="tile" style="text-align:center;color:var(--ok)">Perfect — you knew them all! 🎉</div>`}
      <div class="row" style="margin-top:12px"><button class="btn" onclick="go('vocab')">Vocab home</button><button class="btn primary" onclick="vcStartRound()">Another round</button></div>`;
  }
  function exitVocab(){ if(confirm("Leave this round? Progress won't be saved.")){ vocabState=null; $("nav").style.display="flex"; go("vocab"); } }

  /* ---------- utils ---------- */
  function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
  function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
  window.go=go; window.go2=go2; window.openQ=openQ; window.saveQ=saveQ; window.delQ=delQ;
  window.addSubject=addSubject; window.delSubject=delSubject; window.addTopic=addTopic; window.delTopic=delTopic;
  window.saveProfile=saveProfile; window.signOut=signOut;
  window.startQuiz=startQuiz; window.pick=pick; window.checkMulti=checkMulti; window.submitWritten=submitWritten;
  window.gradeWritten=gradeWritten; window.revealCard=revealCard; window.nextQ=nextQ; window.prevQ=prevQ;
  window.jump=jump; window.toggleFlag=toggleFlag; window.togglePause=togglePause; window.exitQuiz=exitQuiz;
  window.submitQuiz=submitQuiz; window.openNotes=openNotes; window.saveNotes=saveNotes;
  window.goNav=goNav; window.goSubject=goSubject; window.goSubjectAction=goSubjectAction;
  window.clearStatsSubject=clearStatsSubject; window.toggleHomeSubject=toggleHomeSubject;

  /* ---------- start ---------- */
  ensureClient(); if(!client) loadLib();
  </script>
