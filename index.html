<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ExamForge by Ben</title>
<meta name="theme-color" content="#7c4dff" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="ExamForge" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<link rel="apple-touch-icon" href="icon-512.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --accent:#7c4dff; --accent2:#1fbf75;
    --ink:#1a1730; --muted:#6b6685; --bg:#f4f3fa; --card:#ffffff; --line:#e7e4f1;
    --danger:#d8456b; --ok:#0f9d63; --warn:#e08a1e;
    --radius:16px; --shadow:0 14px 40px -22px rgba(46,30,120,.4);
    --fd:"Space Grotesk",system-ui,sans-serif; --fb:"Inter",system-ui,sans-serif;
  }
  [data-theme="dark"]{ --ink:#f2f0ff; --muted:#a39fc2; --bg:#100d1f; --card:#1a1730; --line:#2b2748; --shadow:0 14px 40px -22px rgba(0,0,0,.7); }
  [data-theme="green"]{ --accent:#0f9d63; --accent2:#34d399; --bg:#eef9f3; --card:#fff; --ink:#0f2a1f; --muted:#5a7a6c; --line:#d3ebdf; }
  [data-theme="purple"]{ --accent:#6d28d9; --accent2:#a78bfa; --bg:#f3effd; --card:#fff; --ink:#241546; --muted:#6f5f93; --line:#e3d9f7; }

  *{box-sizing:border-box;} html,body{height:100%;}
  body{ margin:0; font-family:var(--fb); color:var(--ink); background:var(--bg); -webkit-font-smoothing:antialiased; }
  h1,h2,h3{ font-family:var(--fd); letter-spacing:-.02em; margin:0; }
  button{ font-family:var(--fb); cursor:pointer; }
  input,select,textarea{ font-family:var(--fb); font-size:16px; color:var(--ink); background:var(--card); border:1.5px solid var(--line); border-radius:10px; padding:11px 13px; width:100%; }
  input:focus,select,textarea:focus{ outline:none; border-color:var(--accent); }
  textarea{ resize:vertical; min-height:64px; }
  label{ display:block; font-size:12.5px; font-weight:600; margin:0 0 6px; color:var(--muted); }
  .field{ margin-bottom:14px; }
  .row{ display:flex; gap:10px; } .row>*{ flex:1; }
  .btn{ border:none; border-radius:11px; padding:12px 16px; font-weight:600; font-size:14.5px; background:var(--line); color:var(--ink); }
  .btn.primary{ color:#fff; background:linear-gradient(135deg,var(--accent),var(--accent2)); font-family:var(--fd); }
  .btn.ghost{ background:none; color:var(--accent); }
  .btn.danger{ background:rgba(216,69,107,.1); color:var(--danger); }
  .btn.sm{ padding:8px 12px; font-size:13px; border-radius:9px; }
  .btn:disabled{ opacity:.5; cursor:default; }
  .msg{ font-size:13px; border-radius:10px; padding:10px 13px; margin-top:12px; }
  .msg.err{ background:rgba(216,69,107,.1); color:var(--danger); }
  .msg.ok{ background:rgba(31,191,117,.14); color:var(--ok); }
  .hidden{ display:none !important; }

  /* centered auth/setup */
  .center{ min-height:100%; display:grid; place-items:center; padding:22px; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:30px 26px; width:100%; max-width:430px; }
  .brand{ display:flex; align-items:center; gap:10px; margin-bottom:20px; }
  .spark{ width:32px; height:32px; border-radius:9px; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:grid; place-items:center; }
  .spark svg{ width:18px; height:18px; } .wm{ font-family:var(--fd); font-weight:700; font-size:19px; }

  /* app shell */
  #app{ display:none; min-height:100%; padding:0 0 84px; max-width:760px; margin:0 auto; }
  .top{ position:sticky; top:0; z-index:5; background:var(--bg); display:flex; align-items:center; justify-content:space-between; padding:16px 18px 12px; }
  .top h2{ font-size:21px; }
  .av{ width:38px; height:38px; border-radius:50%; object-fit:cover; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; display:grid; place-items:center; font-family:var(--fd); font-weight:700; font-size:15px; border:none; }
  .wrap{ padding:4px 18px; }
  .nav{ position:fixed; bottom:0; left:0; right:0; background:var(--card); border-top:1px solid var(--line); display:flex; justify-content:space-around; padding:8px 4px calc(8px + env(safe-area-inset-bottom)); z-index:6; }
  .nav button{ background:none; border:none; color:var(--muted); font-size:10.5px; display:flex; flex-direction:column; align-items:center; gap:3px; flex:1; padding:4px; font-weight:600; }
  .nav button.on{ color:var(--accent); }
  .nav svg{ width:22px; height:22px; }

  .tile{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:12px; }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .stat{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:16px; }
  .stat .n{ font-family:var(--fd); font-size:28px; font-weight:700; }
  .stat .l{ font-size:12.5px; color:var(--muted); }
  .pcard{ display:flex; align-items:center; gap:14px; }
  .pcard .av{ width:58px; height:58px; font-size:22px; }
  .chip{ display:inline-block; font-size:11px; font-weight:600; padding:3px 9px; border-radius:20px; background:var(--line); color:var(--muted); }
  .listitem{ display:flex; align-items:center; gap:10px; padding:12px 0; border-bottom:1px solid var(--line); }
  .listitem:last-child{ border-bottom:none; }
  .listitem .grow{ flex:1; min-width:0; }
  .listitem .grow .t{ font-weight:600; font-size:14.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .listitem .grow .s{ font-size:12px; color:var(--muted); }
  .dot{ width:12px; height:12px; border-radius:4px; flex:none; }
  .sectiontitle{ font-size:13px; font-weight:700; color:var(--muted); margin:18px 2px 8px; text-transform:uppercase; letter-spacing:.04em; }
  .empty{ text-align:center; color:var(--muted); padding:30px 16px; font-size:14px; }

  .swatch{ display:flex; gap:10px; flex-wrap:wrap; }
  .swatch button{ width:46px; height:46px; border-radius:12px; border:2px solid transparent; }
  .swatch button.on{ border-color:var(--ink); }
  .themebtns{ display:flex; gap:8px; flex-wrap:wrap; }
  .themebtns button{ border:1.5px solid var(--line); background:var(--card); color:var(--ink); border-radius:10px; padding:8px 14px; font-weight:600; font-size:13px; }
  .themebtns button.on{ border-color:var(--accent); color:var(--accent); }

  /* modal */
  .modal{ position:fixed; inset:0; background:rgba(20,12,40,.5); display:grid; place-items:end center; z-index:30; }
  .sheet{ background:var(--card); width:100%; max-width:560px; max-height:92vh; overflow:auto; border-radius:20px 20px 0 0; padding:22px 20px calc(20px + env(safe-area-inset-bottom)); }
  .sheet h3{ font-size:19px; margin-bottom:4px; }
  .sheet .close{ float:right; background:none; border:none; font-size:22px; color:var(--muted); }
  .choicerow{ display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .choicerow .lab{ width:26px; height:26px; border-radius:7px; background:var(--line); display:grid; place-items:center; font-weight:700; font-size:13px; flex:none; }
  .choicerow input[type=text]{ flex:1; }
  .choicerow .ck{ width:24px; height:24px; flex:none; }
  .seg{ display:flex; border:1.5px solid var(--line); border-radius:10px; overflow:hidden; }
  .seg button{ flex:1; background:var(--card); border:none; padding:10px; font-weight:600; font-size:13.5px; color:var(--muted); }
  .seg button.on{ background:var(--accent); color:#fff; }
  .opt{ display:block; width:100%; text-align:left; background:var(--card); border:1.5px solid var(--line); border-radius:11px; padding:13px 14px; margin-bottom:9px; font-size:14.5px; color:var(--ink); }
  .opt .ol{ display:inline-grid; place-items:center; width:24px; height:24px; border-radius:6px; background:var(--line); font-weight:700; font-size:12px; margin-right:8px; vertical-align:middle; }
  .opt.sel{ border-color:var(--accent); background:rgba(124,77,255,.08); }
  .opt.correct{ border-color:var(--ok); background:rgba(31,191,117,.12); }
  .opt.wrong{ border-color:var(--danger); background:rgba(216,69,107,.1); }
  .qhead{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin:4px 0 10px; }
  .qhead .prog{ font-weight:700; } .qhead .timer{ font-family:var(--fd); font-weight:700; color:var(--accent); font-size:17px; }
  .gridnav{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
  .gn{ width:30px; height:30px; border-radius:8px; border:1.5px solid var(--line); background:var(--card); color:var(--muted); font-size:12px; font-weight:600; }
  .gn.cur{ border-color:var(--accent); color:var(--accent); }
  .gn.done{ background:var(--accent); color:#fff; border-color:var(--accent); }
  .gn.flag{ box-shadow:0 0 0 2px var(--warn) inset; }
  .fab{ position:fixed; right:18px; bottom:24px; width:52px; height:52px; border-radius:50%; border:none; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; font-size:21px; box-shadow:0 8px 20px -6px var(--accent); z-index:9; }
  .bar{ height:8px; background:var(--line); border-radius:6px; overflow:hidden; }
</style>
</head>
<body>
  <!-- AUTH -->
  <div id="screen-auth" class="center">
    <div class="card">
      <div class="brand"><span class="spark"><svg viewBox="0 0 24 24" fill="none"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z" fill="#fff"/></svg></span><span class="wm">ExamForge <span style="font-weight:400;opacity:.6;font-size:.6em">by Ben</span></span></div>
      <h1 style="font-size:24px;margin-bottom:6px">Sign in</h1>
      <p style="color:var(--muted);font-size:14px;margin:0 0 18px">Private study space. Sign in with your email and password.</p>
      <div class="field"><label>Email</label><input id="email" type="email" autocomplete="username" placeholder="you@gmail.com" /></div>
      <div class="field"><label>Password</label><input id="password" type="password" autocomplete="current-password" placeholder="Your password" /></div>
      <button class="btn primary" id="send-btn" style="width:100%">Sign in</button>
      <div id="auth-msg" class="msg hidden"></div>
    </div>
  </div>

  <!-- SENT -->
  <div id="screen-sent" class="center hidden">
    <div class="card">
      <div class="brand"><span class="spark"><svg viewBox="0 0 24 24" fill="none"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z" fill="#fff"/></svg></span><span class="wm">ExamForge <span style="font-weight:400;opacity:.6;font-size:.6em">by Ben</span></span></div>
      <h1 style="font-size:24px;margin-bottom:6px">Check your email</h1>
      <p style="color:var(--muted);font-size:14px">Link sent to <b id="sent-to"></b>. Open it on this device.</p>
      <button class="btn ghost" id="back-btn" style="margin-top:8px">Use a different email</button>
    </div>
  </div>

  <!-- PROFILE SETUP -->
  <div id="screen-setup" class="center hidden">
    <div class="card">
      <div class="brand"><span class="spark"><svg viewBox="0 0 24 24" fill="none"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z" fill="#fff"/></svg></span><span class="wm">ExamForge <span style="font-weight:400;opacity:.6;font-size:.6em">by Ben</span></span></div>
      <h1 style="font-size:23px;margin-bottom:4px">Set up your profile</h1>
      <p style="color:var(--muted);font-size:14px;margin:0 0 18px">Just a couple of things to personalise your space.</p>
      <div class="field"><label>Your name</label><input id="su-name" placeholder="e.g. Ben" /></div>
      <div class="field"><label>Grade</label>
        <select id="su-grade"><option value="">Select…</option><option>P6</option><option>M2</option><option>Other</option></select>
      </div>
      <div class="field"><label>Theme</label><div class="themebtns" id="su-themes"></div></div>
      <button class="btn primary" id="su-save" style="width:100%;margin-top:6px">Save & continue</button>
      <div id="su-msg" class="msg hidden"></div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app">
    <div class="top">
      <h2 id="title">Dashboard</h2>
      <button class="av" id="top-av" onclick="go('settings')"></button>
    </div>
    <div class="wrap" id="view"></div>
    <nav class="nav" id="nav"></nav>
  </div>

  <div id="modal-root"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
  const SUPABASE_URL = "https://ziuhrptqgscrhpxytjqc.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_5dy99I-YB_7l4qjGqOwtkQ_iJ4_RDhR";
  const ALLOWED = ["chatchavalin@gmail.com","numooynumooy@gmail.com","mansikarn.d@gmail.com","praritsak@gmail.com"];
  const THEMES = ["light","dark","green","purple"];

  const $ = (id)=>document.getElementById(id);
  const el = (sel)=>document.querySelector(sel);
  let client=null, me=null, profile=null, appConfig={telegram_token:""};
  const state = { subjects:[], subtopics:[], route:"dashboard" };

  /* ---------- supabase bootstrap ---------- */
  function ensureClient(){
    if(client) return client;
    if(window.supabase && window.supabase.createClient){
      client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      client.auth.onAuthStateChange((_e,s)=>{ setTimeout(()=>onSession(s),0); });
      client.auth.getSession().then(({data})=>setTimeout(()=>onSession(data?.session),0)).catch(()=>{});
    }
    return client;
  }
  function loadLib(){
    if(window.supabase){ ensureClient(); return; }
    const s=document.createElement("script");
    s.src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js";
    s.onload=()=>ensureClient(); document.body.appendChild(s);
  }
  async function onSession(session){
    const email = session?.user?.email?.toLowerCase();
    if(email && ALLOWED.includes(email)){
      if(me && me.id===session.user.id && $("app").style.display==="block") return;
      me = session.user; await afterLogin();
    }
    else if(email && client){ client.auth.signOut(); }
  }

  /* ---------- auth UI ---------- */
  const authMsg=(k,t)=>{ const m=$("auth-msg"); m.className="msg "+k; m.textContent=t; m.classList.remove("hidden"); };
  $("send-btn").addEventListener("click", async ()=>{
    $("auth-msg").classList.add("hidden");
    const email=$("email").value.trim().toLowerCase();
    const password=$("password").value;
    if(!email || !password){ authMsg("err","Enter your email and password."); return; }
    if(!ALLOWED.includes(email)){ authMsg("err","This app is private. That email isn't on the list."); return; }
    const c=ensureClient(); if(!c){ authMsg("err","Still loading — try again in a moment."); loadLib(); return; }
    $("send-btn").disabled=true; $("send-btn").textContent="Signing in…";
    try{
      const {error}=await c.auth.signInWithPassword({email,password});
      if(error) authMsg("err","Login failed: "+error.message);
    }catch(e){ authMsg("err","Something went wrong: "+(e.message||e)); }
    $("send-btn").disabled=false; $("send-btn").textContent="Sign in";
  });
  $("password").addEventListener("keydown",e=>{ if(e.key==="Enter") $("send-btn").click(); });
  $("email").addEventListener("keydown",e=>{ if(e.key==="Enter") $("password").focus(); });
  $("back-btn").addEventListener("click",()=>showScreen("auth"));

  function showScreen(name){
    ["auth","sent","setup"].forEach(s=>$("screen-"+s).classList.toggle("hidden", s!==name || name==="app"));
    $("app").style.display = name==="app" ? "block" : "none";
    if(name!=="app"){ ["auth","sent","setup"].forEach(s=>$("screen-"+s).classList.toggle("hidden", s!==name)); }
  }
  function hideAllScreens(){ ["auth","sent","setup"].forEach(s=>$("screen-"+s).classList.add("hidden")); }

  /* ---------- after login ---------- */
  async function afterLogin(){
    // upsert + load profile
    await client.from("profiles").upsert({ id: me.id, email: me.email }, { onConflict:"id" });
    const { data } = await client.from("profiles").select("*").eq("id", me.id).single();
    profile = data || { id:me.id, email:me.email, theme:"light" };
    applyTheme(profile.theme || "light");
    if(!profile.display_name || !profile.grade){ openSetup(); return; }
    await loadBank(); await loadConfig();
    enterApp();
  }
  async function loadConfig(){ try{ const {data}=await client.from("app_config").select("*").eq("id",1).single(); if(data) appConfig=data; }catch(e){} }
  function applyTheme(t){ document.documentElement.setAttribute("data-theme", THEMES.includes(t)?t:"light"); }

  /* ---------- profile setup ---------- */
  function openSetup(){
    hideAllScreens(); $("app").style.display="none"; $("screen-setup").classList.remove("hidden");
    $("su-name").value = profile.display_name||"";
    $("su-grade").value = profile.grade||"";
    let chosen = profile.theme||"light";
    const box=$("su-themes"); box.innerHTML="";
    THEMES.forEach(t=>{ const b=document.createElement("button"); b.textContent=cap(t); b.className=t===chosen?"on":"";
      b.onclick=()=>{ chosen=t; applyTheme(t); [...box.children].forEach(c=>c.className=""); b.className="on"; }; box.appendChild(b); });
    $("su-save").onclick = async ()=>{
      const name=$("su-name").value.trim(), grade=$("su-grade").value;
      if(!name||!grade){ const m=$("su-msg"); m.className="msg err"; m.textContent="Please fill name and grade."; m.classList.remove("hidden"); return; }
      await client.from("profiles").update({ display_name:name, grade, theme:chosen }).eq("id", me.id);
      profile.display_name=name; profile.grade=grade; profile.theme=chosen;
      await loadBank(); enterApp();
    };
  }

  /* ---------- data ---------- */
  async function loadBank(){
    const [{data:subs},{data:subtopics}] = await Promise.all([
      client.from("subjects").select("*").order("name"),
      client.from("subtopics").select("*").order("name")
    ]);
    state.subjects = subs||[]; state.subtopics = subtopics||[];
  }
  const subtopicsOf = (sid)=> state.subtopics.filter(s=>s.subject_id===sid);
  const subjectById = (id)=> state.subjects.find(s=>s.id===id);

  /* ---------- app shell + router ---------- */
  const NAV = [
    ["dashboard","Home", '<path d="M3 11l9-8 9 8M5 10v10h14V10"/>'],
    ["bank","Bank", '<path d="M4 7h16M4 12h16M4 17h10"/>'],
    ["quiz","Quiz", '<path d="M9 11l3 3 8-8M21 12a9 9 0 11-6-8.5"/>'],
    ["stats","Stats", '<path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/>'],
    ["settings","You", '<circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/>'],
  ];
  function enterApp(){ hideAllScreens(); $("app").style.display="block"; buildNav(); go(state.route||"dashboard"); }
  function buildNav(){
    $("nav").innerHTML = NAV.map(([k,l,p])=>`<button data-k="${k}" onclick="go('${k}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${p}</svg>${l}</button>`).join("");
  }
  function go(route){
    state.route=route;
    [...$("nav").children].forEach(b=>b.classList.toggle("on", b.dataset.k===route));
    $("title").textContent = ({dashboard:"Dashboard",bank:"Question bank",quiz:"Quiz",stats:"Stats",settings:"You"})[route];
    $("top-av").innerHTML = avatarInner();
    const v=$("view");
    try{
      if(route==="dashboard") viewDashboard(v);
      else if(route==="bank") viewBank(v);
      else if(route==="settings") viewSettings(v);
      else if(route==="quiz") viewQuiz(v);
      else if(route==="stats") viewStats(v);
    }catch(e){ v.innerHTML = `<div class="msg err">Error: ${e.message}</div>`; }
  }

  function avatarInner(){ return profile.avatar_url ? `<img class="av" src="${profile.avatar_url}" alt="">` : (initials()); }
  function initials(){ const n=profile.display_name||profile.email||"?"; return n.trim().slice(0,1).toUpperCase(); }

  /* ---------- DASHBOARD ---------- */
  async function viewDashboard(v){
    const qCount = await client.from("questions").select("id",{count:"exact",head:true});
    const n = qCount.count||0;
    const {data:atts}=await client.from("attempts").select("created_at");
    const ansCount = await client.from("answers").select("id",{count:"exact",head:true});
    const streak=computeStreak((atts||[]).map(a=>a.created_at));
    v.innerHTML = `
      <div class="tile pcard">
        <div class="av">${profile.avatar_url?`<img class="av" src="${profile.avatar_url}">`:initials()}</div>
        <div><div style="color:var(--muted);font-size:12.5px">${greet()},</div><div style="font-family:var(--fd);font-weight:700;font-size:19px">${esc(profile.display_name||"")}</div>
        <span class="chip">${esc(profile.grade||"")}</span></div>
      </div>
      <div class="grid2">
        <div class="stat"><div class="n">${n}</div><div class="l">Questions in bank</div></div>
        <div class="stat"><div class="n">${state.subjects.length}</div><div class="l">Subjects</div></div>
      </div>
      <div class="grid2" style="margin-top:12px">
        <div class="stat"><div class="n">🔥 ${streak}</div><div class="l">Day streak</div></div>
        <div class="stat"><div class="n">${ansCount.count||0}</div><div class="l">Answered</div></div>
      </div>
      ${n>0?`
      <div class="sectiontitle">Ready to study</div>
      <div class="tile">
        <div style="font-weight:600;margin-bottom:4px">Start a quiz</div>
        <div style="color:var(--muted);font-size:13.5px;margin-bottom:12px">Practice, exam, study or flashcards — pick a subject and go.</div>
        <button class="btn primary" style="width:100%" onclick="go('quiz')">Start quiz</button>

  function computeStreak(dates){
    const days=new Set(dates.map(d=>(d||"").slice(0,10)).filter(Boolean));
    if(!days.size) return 0;
    const iso=x=>x.toISOString().slice(0,10);
    let d=new Date(); let streak=0;
    if(!days.has(iso(d))){ d.setDate(d.getDate()-1); if(!days.has(iso(d))) return 0; }
    while(days.has(iso(d))){ streak++; d.setDate(d.getDate()-1); }
    return streak;
  }

  let _impPvT=null;
  function schedulePreview(){ clearTimeout(_impPvT); _impPvT=setTimeout(()=>{ if($("im-text")) previewImport(); },400); }
  function parseImport(text, defSubject){
    const lines=(text||"").replace(/\r/g,"").split("\n");
    const items=[]; let cur=null, curSub=defSubject||"", curGrade="";
    const choiceRe=/^\s*(\*?)\s*([A-Za-zก-ฮ])[\)\.\:]\s+(.+)$/;
    const push=()=>{ if(cur && cur.stem) items.push(cur); cur=null; };
    for(const raw of lines){
      const line=raw.trim(); if(!line) continue; let mm;
      if(mm=line.match(/^\[subject\]\s*(.*)$/i)){ if(mm[1].trim()) curSub=mm[1].trim(); continue; }
      if(mm=line.match(/^\[grade\]\s*(.*)$/i)){ curGrade=mm[1].trim(); continue; }
      if(mm=line.match(/^Q[:.]\s*(.+)$/i)){ push(); cur={ type:"mcq", subject:curSub, grade:curGrade, stem:mm[1].trim(), choices:[], explanation:null, answer_text:null }; continue; }
      if(mm=line.match(/^W[:.]\s*(.+)$/i)){ push(); cur={ type:"written", subject:curSub, grade:curGrade, stem:mm[1].trim(), choices:[], explanation:null, answer_text:null }; continue; }
      if(mm=line.match(/^(?:E|Explanation)[:.]\s*(.+)$/i)){ if(cur) cur.explanation=mm[1].trim(); continue; }
      if(mm=line.match(/^(?:ANSWER|Ans)[:.]\s*(.+)$/i)){ if(cur){ cur.type="written"; cur.answer_text=mm[1].trim(); } continue; }
      if(cur && cur.type==="mcq" && (mm=line.match(choiceRe))){ cur.choices.push({ correct: mm[1]==="*", content: mm[3].trim() }); continue; }
      if(cur) cur.stem += " " + line;
    }
    push();
    items.forEach(it=>{ if(it.type==="mcq"){ it.answer_mode = it.choices.filter(c=>c.correct).length>1?"multi":"single"; } else it.answer_mode="single"; });
    return items;
  }
  function importIssues(items){
    const errs=[];
    items.forEach((it,i)=>{ const n=i+1;
      if(!it.subject) errs.push(`#${n}: no subject (pick a default or add [Subject]).`);
      if(it.type==="mcq"){ if(it.choices.length<2) errs.push(`#${n}: needs at least 2 choices.`); if(!it.choices.some(c=>c.correct)) errs.push(`#${n}: no correct choice marked with *.`); }
      if(it.type==="written" && !it.answer_text) errs.push(`#${n}: written question has no ANSWER.`);
    });
    return errs;
  }

  async function runImport(){

    if(items.length && importIssues(items).length){ msg.className="msg err"; msg.textContent="Fix the issues shown in Preview first."; previewImport(); return; }
    $("im-go").disabled=true; msg.className="msg"; msg.textContent="Importing…";
    let existing=new Set();

    const subByName={}; state.subjects.forEach(s=>subByName[s.name.toLowerCase()]=s.id);
    let added=0, skipped=0;
    for(const it of items){
      if(skip && existing.has(it.stem.trim().toLowerCase())){ skipped++; continue; }
      let sid=subByName[(it.subject||"").toLowerCase()];
      if(!sid && it.subject){ const {data}=await client.from("subjects").insert({name:it.subject,color:"#7c4dff",default_time_per_q:60}).select("*").single(); if(data){ sid=data.id; subByName[it.subject.toLowerCase()]=sid; state.subjects.push(data); } }
      const ins={ subject_id:sid||state.subjects[0]?.id||null, subtopic_id:null, grade:it.grade||null, type:it.type, answer_mode:it.answer_mode, passage:null, stem:it.stem, answer_text:it.answer_text||null, explanation:it.explanation||null, created_by:me.id };
      const {data:nq,error}=await client.from("questions").insert(ins).select("id").single();
      if(error||!nq) continue;
      if(it.type==="mcq" && it.choices.length){ const labels=["ก","ข","ค","ง","จ","ฉ"]; await client.from("choices").insert(it.choices.map((c,idx)=>({question_id:nq.id,label:labels[idx]||String(idx+1),content:c.content,is_correct:!!c.correct,position:idx}))); }
      existing.add(it.stem.trim().toLowerCase()); added++;
    }
    const figAdded=await aiFlushFigs(subByName);
    if(figAdded){ aiFigs=aiFigs.filter(f=>!f.ans); renderAiFigs(); }
    msg.className="msg ok"; msg.textContent=`Imported ${added+figAdded} question(s)`+(skipped?`, skipped ${skipped} duplicate(s)`:"")+(figAdded?` (incl. ${figAdded} figure)`:"")+".";
    if(added+figAdded>0){ $("im-text").value=""; aiFigs=[]; renderAiFigs(); const pv=$("im-preview"); if(pv) pv.innerHTML=""; const af=$("ai-file"); if(af) af.value=""; }
    $("im-go").disabled=false; loadQ();
  }

  let _pdfjs=null, _tess=null;
  function ensurePdfLib(){
    return new Promise((res,rej)=>{
      if(_pdfjs) return res(_pdfjs);
      const s=document.createElement("script");
      s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
      s.onload=()=>{ const lib=window.pdfjsLib; if(!lib){ rej(new Error("PDF reader missing")); return; } lib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"; _pdfjs=lib; res(lib); };
      s.onerror=()=>rej(new Error("Couldn't load the PDF reader"));
      document.body.appendChild(s);
    });
  }
  function ensureTesseract(){
    return new Promise((res,rej)=>{
      if(_tess) return res(_tess);
      const s=document.createElement("script");
      s.src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
      s.onload=()=>{ if(!window.Tesseract){ rej(new Error("OCR missing")); return; } _tess=window.Tesseract; res(window.Tesseract); };
      s.onerror=()=>rej(new Error("Couldn't load the OCR engine"));
      document.body.appendChild(s);

  function pdfToFormat(text){
    text=(text||"").replace(/\r/g,"");
    text=text.replace(/\s+(?=\d{1,3}[\.\)]\s)/g,"\n");
    text=text.replace(/\s+(?=(?:[ก-ง]|[A-Da-d])[\.\)]\s)/g,"\n");
    const rawlines=text.split("\n").map(s=>s.trim()).filter(Boolean);
    const out=[]; let started=false; let curChoices=0;
    const qStart=/^(?:\d{1,3}|[๐-๙]{1,3})[\.\)]\s*(.*)$/;
    const chChoice=/^\(?([ก-ฮA-Da-d])[\.\)]\s*(.+)$/;
    const letters=["A","B","C","D","E","F"];
    for(const line of rawlines){
      let m;
      if(m=line.match(qStart)){ out.push(""); out.push("Q: "+(m[1]||"").trim()); started=true; curChoices=0; continue; }
      if(started && (m=line.match(chChoice))){ out.push(letters[curChoices]+") "+m[2].trim()); curChoices++; continue; }

  async function handleImgFile(e){

  function analyzePage(canvas, gapFrac){
    const W=canvas.width, H=canvas.height; const aw=Math.min(160,W); const scale=aw/W; const ah=Math.max(1,Math.round(H*scale));
    const ac=document.createElement("canvas"); ac.width=aw; ac.height=ah; ac.getContext("2d").drawImage(canvas,0,0,aw,ah);
    const d=ac.getContext("2d").getImageData(0,0,aw,ah).data; const ink=new Array(ah).fill(false);
    for(let y=0;y<ah;y++){ let dark=0; for(let x=0;x<aw;x++){ const i=(y*aw+x)*4; const lum=0.3*d[i]+0.59*d[i+1]+0.11*d[i+2]; if(lum<140 && d[i+3]>20) dark++; } ink[y]=(dark/aw)>0.012; }
    const gapThresh=Math.max(4,Math.round(ah*gapFrac)); const segs=[]; let start=null,last=null,blank=0;

    return segs.filter(s=>(s[1]-s[0])>=minH).map(s=>[Math.max(0,Math.round((s[0]-pad)/scale)),Math.min(H,Math.round((s[1]+pad)/scale))]);
  }
  function proposeLines(pi){

    else { const segs=analyzePage(pg.canvas, 0.02); for(let i=0;i<segs.length-1;i++) lines.push(Math.round((segs[i][1]+segs[i+1][0])/2)); }

  function pageInkProfile(pi){
    const pg=imgPages[pi]; if(pg._prof) return pg._prof; const c=pg.canvas;
    const W=c.width,H=c.height; const aw=Math.min(160,W); const scale=aw/W; const ah=Math.max(1,Math.round(H*scale));
    const ac=document.createElement("canvas"); ac.width=aw; ac.height=ah; ac.getContext("2d").drawImage(c,0,0,aw,ah);
    const d=ac.getContext("2d").getImageData(0,0,aw,ah).data; const frac=new Float32Array(ah);
    for(let y=0;y<ah;y++){ let dark=0; for(let x=0;x<aw;x++){ const i=(y*aw+x)*4; const lum=0.3*d[i]+0.59*d[i+1]+0.11*d[i+2]; if(lum<140&&d[i+3]>20)dark++; } frac[y]=dark/aw; }

  function snapY(pi, ySrc){

  }

  async function ocrAssist(){
    const stat=$("ii-stat"); const set=t=>{ if(stat) stat.textContent=t; };
    try{
      set("Loading OCR (first run downloads a few MB)…");
      const T=await ensureTesseract();
      const c=imgPages[curPage].canvas; const srcH=c.height;
      set(`Reading page ${curPage+1}… (a few seconds)`);
      let ocrCanvas=c;
      if(imgPdf){ try{ const page=await imgPdf.getPage(curPage+1); const vp=page.getViewport({scale:3}); const hc=document.createElement("canvas"); hc.width=vp.width; hc.height=vp.height; await page.render({canvasContext:hc.getContext("2d"),viewport:vp}).promise; ocrCanvas=hc; }catch(_){ ocrCanvas=c; } }
      const W=ocrCanvas.width; const ratio=srcH/ocrCanvas.height;
      const worker=await T.createWorker("tha+eng");
      let tsv="", words=[];
      try{
        const r=await worker.recognize(ocrCanvas,{},{tsv:true,blocks:true});
        tsv=(r.data&&r.data.tsv)||"";
        if(r.data&&r.data.words&&r.data.words.length) words=r.data.words;
        else if(r.data&&r.data.blocks) r.data.blocks.forEach(bl=>(bl.paragraphs||[]).forEach(p=>(p.lines||[]).forEach(ln=>(ln.words||[]).forEach(w=>words.push(w)))));
      }catch(_){ try{ const r=await worker.recognize(ocrCanvas); tsv=(r.data&&r.data.tsv)||""; if(r.data&&r.data.words) words=r.data.words; }catch(e2){} }
      await worker.terminate();
      const nums=[];
      if(tsv){
        tsv.split("\n").forEach(line=>{ const p=line.split("\t"); if(p.length<12) return; const left=+p[6], top=+p[7], h=+p[9], conf=parseFloat(p[10]); const text=(p[11]||"").trim();
          if(text && /^\d{1,3}[.\)]/.test(text) && left < W*0.18 && (isNaN(conf)||conf>25) && h>10) nums.push(top*ratio); });
      } else {
        words.forEach(w=>{ const t=(w.text||"").trim(); const b=w.bbox||{}; const conf=w.confidence||0; const h=(b.y1-b.y0)||0;
          if(/^\d{1,3}[.\)]/.test(t) && b.x0 < W*0.18 && conf>25 && h>10) nums.push(b.y0*ratio); });
      }
      nums.sort((a,b)=>a-b);
      const merged=[]; nums.forEach(y=>{ if(!merged.length || y-merged[merged.length-1] > srcH*0.02) merged.push(y); });
      if(!merged.length){ const seen=tsv?tsv.split("\n").filter(l=>{const p=l.split("\t");return p.length>=12&&(p[11]||"").trim();}).length:words.length; set(`OCR read ${seen} text bits but couldn't pick out question numbers here. Add lines by tapping.`); return; }

      set(`OCR placed ${linesByPage[curPage].length} line(s) on page ${curPage+1}. Fix any it missed, then continue.`);

  }

  function startsToSegments(canvas, starts){

    for(let i=0;i<ys.length;i++){ const y0=Math.max(0,Math.round(ys[i]-6)); const y1=Math.round(i+1<ys.length? ys[i+1]-6 : H); segs.push([y0, trimBottom(canvas,y0,y1)]); }

  function trimBottom(canvas,y0,y1){
    const W=canvas.width; const aw=Math.min(160,W); const scale=aw/W; const ah=Math.max(1,Math.round((y1-y0)*scale));
    const ac=document.createElement("canvas"); ac.width=aw; ac.height=ah; ac.getContext("2d").drawImage(canvas,0,y0,W,(y1-y0),0,0,aw,ah);
    const d=ac.getContext("2d").getImageData(0,0,aw,ah).data; let last=0;

  function cleanInk(c){ const ctx=c.getContext("2d"); const im=ctx.getImageData(0,0,c.width,c.height); const d=im.data; for(let i=0;i<d.length;i+=4){ const r=d[i],g=d[i+1],b=d[i+2]; const mx=Math.max(r,g,b),mn=Math.min(r,g,b); if(mx-mn>45){ d[i]=d[i+1]=d[i+2]=255; } } ctx.putImageData(im,0,0); return c; }

  async function runImageImport(){

  let aiFigs=[];

  const AI_PROMPT = "You are reading ONE page of a Thai school exam. Return ONLY a JSON object (no commentary, no code fences) shaped as {\"q\":[ ... ]}, listing every question on the page in order. Each item is ONE of:\n"
    + "- A text/table question answerable from words alone: {\"k\":\"t\",\"sub\":\"<subject>\",\"gr\":\"<grade e.g. M1 or empty>\",\"stem\":\"<full question; write any small table out inline>\",\"ch\":[\"choice1\",\"choice2\",...],\"ans\":<0-based index of correct choice, or -1 if unknown>}\n"

    + "Rules: choices follow ก ข ค ง order. Keep any A/B/C/D items that belong to the question text INSIDE stem. Honor handwritten answer marks. For figure questions, y0/y1 must span the entire question including its picture and its choices. Output ONLY the JSON object.";
  function aimsg(t){ const s=$("ai-keymsg"); if(!s)return; s.className="msg"; s.textContent=t; s.classList.remove("hidden"); }

  async function aiLoadCanvases(file){
    const out=[];
    if(file.type==="application/pdf"){ const pdfjs=await ensurePdfLib(); const buf=await file.arrayBuffer(); const pdf=await pdfjs.getDocument({data:buf}).promise; const mx=Math.min(pdf.numPages,10); for(let p=1;p<=mx;p++){ const page=await pdf.getPage(p); const vp=page.getViewport({scale:2}); const cv=document.createElement("canvas"); cv.width=vp.width; cv.height=vp.height; await page.render({canvasContext:cv.getContext("2d"),viewport:vp}).promise; out.push(cv); } }
    else if((file.type||"").startsWith("image/")){ const url=URL.createObjectURL(file); const img=await new Promise((res,rej)=>{const im=new Image(); im.onload=()=>res(im); im.onerror=()=>rej(new Error("Couldn't read image")); im.src=url;}); const cv=document.createElement("canvas"); cv.width=img.naturalWidth; cv.height=img.naturalHeight; cv.getContext("2d").drawImage(img,0,0); out.push(cv); URL.revokeObjectURL(url); }
    else throw new Error("Please choose a PDF or an image.");
    return out;
  }
  function cropRegion(src,y0,y1){ const h=Math.max(1,Math.round(y1-y0)); const c=document.createElement("canvas"); c.width=src.width; c.height=h; c.getContext("2d").drawImage(src,0,Math.round(y0),src.width,h,0,0,src.width,h); return c; }
  async function aiCallGemini(key,b64,prompt){
    const res=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key="+encodeURIComponent(key),{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ contents:[{ parts:[{text:prompt},{inline_data:{mime_type:"image/jpeg",data:b64}}] }] }) });
    const j=await res.json(); if(j.error) throw new Error(j.error.message||"Gemini error");
    const cand=(j.candidates||[])[0]||{}; const parts=((cand.content||{}).parts)||[]; return parts.map(p=>p.text||"").join("");
  }
  async function aiCallClaude(key,b64,prompt){
    const res=await fetch("https://api.anthropic.com/v1/messages",{ method:"POST", headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"}, body:JSON.stringify({ model:"claude-haiku-4-5-20251001", max_tokens:3000, messages:[{ role:"user", content:[{type:"text",text:prompt},{type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}}] }] }) });
    const j=await res.json(); if(j.error) throw new Error((j.error.message)||"Claude error");

  }
  function aiParse(raw){ let t=(raw||"").replace(/```[a-z]*\n?/gi,"").trim(); const a=t.indexOf("{"), b=t.lastIndexOf("}"); if(a>=0&&b>a) t=t.slice(a,b+1); return JSON.parse(t); }
  async function aiExtract(){
    const prov=$("ai-prov").value; const set=t=>{ const s=$("ai-stat"); if(s) s.textContent=t; };
    const key = prov==="claude" ? (appConfig.claude_key||"") : (appConfig.gemini_key||"");
    if(!key){ set("No "+(prov==="claude"?"Claude":"Gemini")+" key saved yet — add it in You → AI auto-import."); return; }
    const f=$("ai-file").files[0]; if(!f){ set("Choose a PDF or photo first."); return; }
    const def=$("im-sub").value||"";
    const btn=$("ai-go"); const restore=()=>{ if(btn){ btn.disabled=false; btn.textContent="Extract questions"; } };
    if(btn){ btn.disabled=true; btn.textContent="Reading…"; }
    try{
      set("Loading file…"); const canvases=await aiLoadCanvases(f); let out=""; aiFigs=[]; let txtN=0;
      for(let i=0;i<canvases.length;i++){ set("Reading page "+(i+1)+"/"+canvases.length+" with "+(prov==="claude"?"Claude":"Gemini")+"…");
        const b64=canvases[i].toDataURL("image/jpeg",0.85).split(",")[1];

        let parsed=null; try{ parsed=aiParse(raw); }catch(_){ parsed=null; }

          for(const it of parsed.q){
            if(it.k==="f"){ const y0=Math.max(0,Math.min(1,it.y0||0))*H, y1=Math.max(0,Math.min(1,it.y1==null?1:it.y1))*H; if(y1-y0<8) continue;
              aiFigs.push({ src:canvases[i], y0:Math.round(y0), y1:Math.round(y1), count:Math.max(2,Math.min(6,it.nch||4)), ans:(it.ans>=0?AI_LABELS[it.ans]:null), sub:it.sub||def, gr:it.gr||null }); }
            else { const sub=it.sub||def, gr=it.gr||""; let blk="[Subject] "+sub+"\n[Grade] "+gr+"\n"; if(it.w){ blk+="W: "+(it.stem||"")+"\nANSWER: "+(it.awr||"")+"\n"; } else { blk+="Q: "+(it.stem||"")+"\n"; (it.ch||[]).forEach((c,idx)=>{ blk+=((it.ans===idx)?"*":"")+(AI_LABELS[idx]||String(idx+1))+") "+c+"\n"; }); } out+=(out?"\n":"")+blk+"\n"; txtN++; }
          }
        } else { out += (out?"\n\n":"") + (raw||"").replace(/```[a-z]*\n?/gi,"").trim(); }
      }

      set("Done — "+txtN+" text question(s) below"+(aiFigs.length?(" and "+aiFigs.length+" figure question(s) auto-cropped"):"")+". Check answers, then Import.");
      previewImport();
      const r=(aiFigs.length?$("ai-figs"):$("im-msg")); if(r) r.scrollIntoView({behavior:"smooth",block:"center"});
    }catch(e){ set("Failed: "+(e.message||e)); }
    finally{ restore(); }
  }
  function renderAiFigs(){
    const box=$("ai-figs"); if(!box) return;
    if(!aiFigs.length){ box.innerHTML=""; return; }
    box.innerHTML="<div style=\"font-size:12.5px;font-weight:600;margin:4px 0 6px\">🖼 Figure questions (auto-cropped — adjust if needed)</div>"+aiFigs.map((fg,i)=>{
      const crop=cropRegion(fg.src,fg.y0,fg.y1);
      const tw=Math.min(crop.width,260), th=Math.max(1,Math.round(crop.height*(tw/crop.width))); const tc=document.createElement("canvas"); tc.width=tw; tc.height=th; tc.getContext("2d").drawImage(crop,0,0,tw,th); const url=tc.toDataURL("image/jpeg",0.7);
      const letters=AI_LABELS.slice(0,fg.count).map(L=>`<button onclick="aiFigAns(${i},'${L}')" style="padding:4px 9px;border-radius:7px;border:1px solid var(--border);font-size:12px;background:${fg.ans===L?'var(--accent)':'transparent'};color:${fg.ans===L?'#fff':'var(--text)'}">${L}</button>`).join(" ");
      const nb=(edge,dir,lbl)=>`<button onclick="aiFigNudge(${i},'${edge}',${dir})" style="padding:3px 8px;border-radius:6px;border:1px solid var(--border);font-size:13px;background:transparent;color:var(--text)">${lbl}</button>`;
      const cropRow=`<div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:7px;font-size:11px;color:var(--muted)"><span>Crop top</span>${nb('t',-1,'▲')}${nb('t',1,'▼')}<span style="margin-left:6px">bottom</span>${nb('b',-1,'▲')}${nb('b',1,'▼')}<button onclick="aiFigManual(${i})" style="margin-left:6px;padding:3px 9px;border-radius:6px;border:1px solid var(--accent);font-size:11px;background:transparent;color:var(--accent)">Drag-crop</button></div>`;
      return `<div style="border:1px solid var(--border);border-radius:10px;padding:8px;margin-bottom:8px"><img src="${url}" style="width:100%;border-radius:6px"><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:6px"><span style="font-size:12px;color:var(--muted)">Answer:</span>${letters}<button onclick="aiFigCount(${i})" style="padding:4px 8px;border-radius:7px;border:1px solid var(--border);font-size:11px;background:transparent;color:var(--muted)">${fg.count} choices</button><button onclick="aiFigDrop(${i})" style="margin-left:auto;padding:4px 8px;border-radius:7px;border:1px solid var(--border);font-size:11px;background:transparent;color:var(--danger,#e5484d)">✕</button></div>${cropRow}</div>`;
    }).join("");
  }

  function aiFigManual(i){

    function paint(){ h0.style.top=(st.y0-9)+"px"; h1.style.top=(st.y1-9)+"px"; $("mc-shade-t").style.height=Math.max(0,st.y0)+"px"; $("mc-shade-b").style.height=Math.max(0,dh-st.y1)+"px"; }
    function pos(e){ const r=wrap.getBoundingClientRect(); const cy=(e.touches?e.touches[0].clientY:e.clientY)-r.top; return Math.max(0,Math.min(dh,cy)); }
    function down(e){ const which=e.target&&e.target.dataset?e.target.dataset.h:null; if(which===null||which===undefined) return; st.drag=which; e.preventDefault(); }
    function move(e){ if(st.drag===null) return; const y=pos(e); if(st.drag==="0") st.y0=Math.min(y,st.y1-14); else st.y1=Math.max(y,st.y0+14); paint(); e.preventDefault(); }

    h0.addEventListener("touchstart",down); h1.addEventListener("touchstart",down); h0.addEventListener("mousedown",down); h1.addEventListener("mousedown",down);

  }

  async function aiFlushFigs(subByName){

        sid=sid||state.subjects[0]?.id||null;
        const blob=await canvasToBlob(cropRegion(fg.src,fg.y0,fg.y1)); if(!blob) continue;
        const path=`${me.id}/${Date.now()}_f${k}.jpg`;
        const up=await client.storage.from("qimages").upload(path,blob,{contentType:"image/jpeg",upsert:true}); if(up.error) throw up.error;
        const url=client.storage.from("qimages").getPublicUrl(path).data.publicUrl;

  async function importData(e){
    const file=e.target.files[0]; if(!file) return;
    bkmsg("","Reading file…");
    let dump; try{ dump=JSON.parse(await file.text()); }catch(err){ bkmsg("err","That file isn't a valid backup."); return; }
    if(!dump||!Array.isArray(dump.questions)){ bkmsg("err","That file isn't an ExamForge backup."); return; }
    try{
      await loadBank();
      const subMap={};
      for(const s of (dump.subjects||[])){
        let ex=state.subjects.find(x=>x.name===s.name);
        if(!ex){ const {data}=await client.from("subjects").insert({name:s.name,color:s.color||"#7c4dff",default_time_per_q:s.default_time_per_q||60}).select("*").single(); ex=data; if(ex)state.subjects.push(ex); }
        if(ex) subMap[s.id]=ex.id;
      }
      const {data:curSt}=await client.from("subtopics").select("*");
      const stMap={};
      for(const t of (dump.subtopics||[])){
        const newSub=subMap[t.subject_id]; if(!newSub) continue;
        let ex=(curSt||[]).find(x=>x.subject_id===newSub&&x.name===t.name);
        if(!ex){ const {data}=await client.from("subtopics").insert({subject_id:newSub,name:t.name}).select("*").single(); ex=data; }
        if(ex) stMap[t.id]=ex.id;
      }
      let added=0;
      for(const q of dump.questions){
        const ins={ subject_id:subMap[q.subject_id]||state.subjects[0]?.id||null, subtopic_id:stMap[q.subtopic_id]||null,
          grade:q.grade||null, type:q.type||"mcq", answer_mode:q.answer_mode||"single", passage:q.passage||null,
          stem:q.stem||"", answer_text:q.answer_text||null, explanation:q.explanation||null, created_by:me.id };
        const {data:nq,error}=await client.from("questions").insert(ins).select("id").single();
        if(error||!nq) continue;
        const ch=(dump.choices||[]).filter(c=>c.question_id===q.id);
        if(ch.length){ await client.from("choices").insert(ch.map(c=>({question_id:nq.id,label:c.label,content:c.content,is_correct:!!c.is_correct,position:c.position||0}))); }
        added++;
      }
      bkmsg("ok","Restored "+added+" questions. Refresh to see them in the Bank.");
    }catch(err){ bkmsg("err","Restore failed: "+err.message); }
  }

  function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
  let quiz=null, timerInt=null;

  function qzmsg(t){ const m=$("qz-msg"); if(m){ m.className="msg err"; m.textContent=t; m.classList.remove("hidden"); } }

  async function startQuiz(mistakes){
    const v=$("view"); const mode = mistakes ? "practice" : v._mode();
    const sub=$("qz-sub")?.value||"", st=$("qz-st")?.value||"", grade=$("qz-grade")?.value||"";
    const count=parseInt($("qz-count")?.value||"10",10), perQ=parseInt($("qz-time")?.value||"60",10);
    let ids=null;
    if(mistakes){ const {data:wrong}=await client.from("answers").select("question_id").eq("is_correct",false);
      ids=[...new Set((wrong||[]).map(w=>w.question_id).filter(Boolean))]; if(!ids.length){ qzmsg("No past mistakes yet — take a quiz first."); return; } }
    let qy=client.from("questions").select("*");
    if(sub) qy=qy.eq("subject_id",sub); if(st) qy=qy.eq("subtopic_id",st); if(grade) qy=qy.eq("grade",grade); if(ids) qy=qy.in("id",ids);
    const {data:qs}=await qy;
    if(!qs||!qs.length){ qzmsg("No matching questions. Add more to your bank or widen the filters."); return; }
    const picked=shuffle(qs).slice(0,count);
    const {data:allCh}=await client.from("choices").select("*").in("question_id",picked.map(q=>q.id));
    const items=picked.map(q=>{ let chs=(allCh||[]).filter(c=>c.question_id===q.id).sort((a,b)=>a.position-b.position);
      if(q.type!=="written" && !isLocked(chs)) chs=shuffle(chs); return {q, choices:chs}; });
    const timed=(mode==="practice"||mode==="exam");
    quiz={ items, idx:0, mode, timed, perQ, timeLeft: timed?items.length*perQ:0, answers:{}, flags:new Set(), startedAt:Date.now(), paused:false };
    $("nav").style.display="none"; $("title").textContent=cap(mode)+" quiz";
    if(timed){ clearInterval(timerInt); timerInt=setInterval(()=>{ if(quiz&&!quiz.paused){ quiz.timeLeft--; updateTimer(); if(quiz.timeLeft<=0){ clearInterval(timerInt); submitQuiz(true); } } },1000); }
    renderQ();
  }
  function updateTimer(){ const t=$("qz-timer"); if(t&&quiz){ const m=Math.floor(quiz.timeLeft/60), s=quiz.timeLeft%60; t.textContent=`${m}:${String(s).padStart(2,'0')}`; } }

  function renderQ(){
    const v=$("view"); const it=quiz.items[quiz.idx], q=it.q, a=quiz.answers[q.id]||{};

        if(a.self_graded) body+=`<div class="msg ${a.correct?'ok':'err'}">Marked ${a.correct?'correct':'wrong'}.</div>`;

        return `<button class="${cls}" onclick="pick('${c.id}')" ${reveal?"disabled":""}><span class="ol">${c.label}</span>${esc(c.content)}</button>`; }).join("");
      if(multi && quiz.mode==="practice" && !reveal) body+=`<button class="btn primary sm" style="margin-top:6px" onclick="checkMulti()">Check answer</button>`;
      if(quiz.mode==="flashcard" && !reveal) body+=`<button class="btn sm" style="margin-top:6px" onclick="revealCard()">Show answer</button>`;
      if(reveal && q.explanation) body+=`<div class="tile" style="margin-top:10px;background:rgba(124,77,255,.06)"><div style="font-size:12px;color:var(--muted)">Explanation</div>${esc(q.explanation)}</div>`;

      <div style="height:4px;background:var(--line);border-radius:3px;overflow:hidden;margin:2px 0 10px"><div style="height:100%;width:${Math.round((quiz.idx+1)/quiz.items.length*100)}%;background:var(--accent);transition:width .25s"></div></div>
      <div class="gridnav">${quiz.items.map((x,i)=>{ const aa=quiz.answers[x.q.id]; let c="gn"; if(i===quiz.idx)c+=" cur"; if(aa&&((aa.chosen&&aa.chosen.length)||aa.written||aa.submitted))c+=" done"; if(quiz.flags.has(i))c+=" flag"; return `<button class="${c}" onclick="jump(${i})">${i+1}</button>`; }).join("")}</div>

  }
  function pick(cid){
    const it=quiz.items[quiz.idx], q=it.q; const a=quiz.answers[q.id]||{chosen:[]};

  function checkMulti(){ const it=quiz.items[quiz.idx], q=it.q; const a=quiz.answers[q.id]||{chosen:[]}; if(quiz.mode==="practice"){ a.submitted=true; a.correct=isCorrect(q,it.choices,a); } quiz.answers[q.id]=a; renderQ(); }

  function isCorrect(q,choices,a){ if(!a) return false; if(q.type==="written") return !!a.correct;
    const cc=choices.filter(c=>c.is_correct).map(c=>c.id).sort(); const ch=(a.chosen||[]).slice().sort();

  function jump(i){ quiz.idx=i; renderQ(); }

  function exitQuiz(){ if(confirm("Leave this quiz? Progress won't be saved.")){ clearInterval(timerInt); quiz=null; $("nav").style.display="flex"; go("quiz"); } }

  async function submitQuiz(auto){
    clearInterval(timerInt);
    const scored=(quiz.mode==="practice"||quiz.mode==="exam");
    if(!scored){ quiz=null; $("nav").style.display="flex"; go("quiz"); return; }
    let correct=0; const rows=[]; const duration=Math.round((Date.now()-quiz.startedAt)/1000);
    quiz.items.forEach(it=>{ const q=it.q, a=quiz.answers[q.id]||{}; const ok=isCorrect(q,it.choices,a); if(ok)correct++;
      rows.push({ question_id:q.id, subject_id:q.subject_id, subtopic_id:q.subtopic_id, chosen:a.chosen||null, written_text:a.written||null, is_correct:ok, self_graded:!!a.self_graded, time_sec:0 }); });
    try{ const {data:att,error}=await client.from("attempts").insert({ mode:quiz.mode, total:quiz.items.length, correct, score:correct, duration_sec:duration }).select("id").single();
      if(!error && att) await client.from("answers").insert(rows.map(r=>({...r, attempt_id:att.id}))); }catch(e){}
    const result={ total:quiz.items.length, correct, items:quiz.items.map(it=>({q:it.q, choices:it.choices, a:quiz.answers[it.q.id]||{}})) };
    try{ tgSendReport(quiz.mode, result); }catch(e){}
    quiz=null; $("nav").style.display="flex"; showResults(result);
  }
  function perfColor(p){ return p>=75?'#1fbf75':p>=50?'#e08a1e':'#d8456b'; }
  function barRow(name,c,t){ const p=t?Math.round(c/t*100):0; return `<div style="margin-bottom:11px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>${esc(name)}</span><span style="color:var(--muted)">${c}/${t} · ${p}%</span></div><div class="bar"><div style="height:100%;width:${p}%;background:${perfColor(p)}"></div></div></div>`; }
  function showResults(r){
    const pct=Math.round(r.correct/r.total*100); const bySub={};
    r.items.forEach(it=>{ const s=subjectById(it.q.subject_id); const n=s?s.name:"—"; bySub[n]=bySub[n]||{c:0,t:0}; bySub[n].t++; if(isCorrect(it.q,it.choices,it.a))bySub[n].c++; });
    state.route="quiz"; $("title").textContent="Results"; [...$("nav").children].forEach(b=>b.classList.toggle("on",b.dataset.k==="quiz"));
    $("view").innerHTML=`
      <div class="tile" style="text-align:center"><div style="font-family:var(--fd);font-size:46px;font-weight:700;color:${perfColor(pct)}">${pct}%</div><div style="color:var(--muted)">${r.correct} of ${r.total} correct</div></div>
      <div class="sectiontitle">By subject</div>
      <div class="tile">${Object.entries(bySub).map(([n,d])=>barRow(n,d.c,d.t)).join("")}</div>
      <div class="sectiontitle">Review</div>
      ${r.items.map((it,i)=>{ const ok=isCorrect(it.q,it.choices,it.a); const correctTxt=it.q.type==="written"?esc(it.q.answer_text||"—"):it.choices.filter(c=>c.is_correct).map(c=>c.label+". "+esc(c.content)).join(", ");
        return `<div class="tile"><div style="display:flex;gap:8px"><span style="color:${ok?'var(--ok)':'var(--danger)'};font-weight:700">${ok?'✓':'✗'}</span><div style="flex:1"><div style="font-weight:600;font-size:14px">${i+1}. ${esc(it.q.stem)}</div><div style="font-size:12.5px;color:var(--muted);margin-top:4px">Correct: ${correctTxt}</div>${it.q.explanation?`<div style="font-size:12.5px;margin-top:4px">${esc(it.q.explanation)}</div>`:""}</div></div></div>`; }).join("")}
      <div class="row" style="margin-top:12px"><button class="btn" onclick="go('dashboard')">Dashboard</button><button class="btn primary" onclick="go('quiz')">New quiz</button></div>`;
  }

  /* ---------- STATS ---------- */
  async function viewStats(v){
    v.innerHTML=`<div class="empty">Loading…</div>`;
    const [{data:answers},{data:attempts}] = await Promise.all([
      client.from("answers").select("is_correct,subject_id,created_at"),
      client.from("attempts").select("created_at,total")
    ]);
    if(!answers||!answers.length){ v.innerHTML=`<div class="empty">No quiz data yet.<br>Take a quiz to see your stats!</div>`; return; }
    const total=answers.length, correct=answers.filter(a=>a.is_correct).length; const bySub={};
    answers.forEach(a=>{ const s=subjectById(a.subject_id); const n=s?s.name:"—"; bySub[n]=bySub[n]||{c:0,t:0}; bySub[n].t++; if(a.is_correct)bySub[n].c++; });
    const entries=Object.entries(bySub).map(([n,d])=>[n,d.c,d.t,d.t?Math.round(d.c/d.t*100):0]).sort((a,b)=>a[3]-b[3]);
    const weakest=entries[0], strongest=entries[entries.length-1];
    const days={}; (attempts||[]).forEach(at=>{ const d=(at.created_at||"").slice(0,10); days[d]=(days[d]||0)+(at.total||0); });
    const last=Object.entries(days).sort().slice(-14);
    const quizzes=(attempts||[]).length, activeDays=Object.keys(days).length;
    const maxN=Math.max(1,...last.map(([,n])=>n));
    v.innerHTML=`
      <div class="grid2">
        <div class="stat"><div class="n">${Math.round(correct/total*100)}%</div><div class="l">Overall accuracy</div></div>
        <div class="stat"><div class="n">${total}</div><div class="l">Questions answered</div></div>
      </div>
      <div class="grid2" style="margin-top:12px">
        <div class="stat"><div class="n">${quizzes}</div><div class="l">Quizzes taken</div></div>
        <div class="stat"><div class="n">${activeDays}</div><div class="l">Days active</div></div>
      </div>
      ${entries.length>1?`<div class="tile" style="margin-top:12px;font-size:13.5px"><b style="color:var(--ok)">Strongest:</b> ${esc(strongest[0])} (${strongest[3]}%)<br><b style="color:var(--danger)">Weakest:</b> ${esc(weakest[0])} (${weakest[3]}%)</div>`:""}
      <div class="sectiontitle">By subject</div>
      <div class="tile">${entries.map(e=>barRow(e[0],e[1],e[2])).join("")}</div>
      <div class="sectiontitle">Recent activity</div>
      <div class="tile">${last.length?last.map(([d,n])=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px"><span style="font-size:11px;color:var(--muted);width:48px">${esc(d.slice(5))}</span><div style="flex:1;background:var(--line);border-radius:4px;height:14px;overflow:hidden"><div style="height:100%;width:${Math.round(n/maxN*100)}%;background:var(--accent)"></div></div><span style="font-size:11px;color:var(--muted);width:26px;text-align:right">${n}</span></div>`).join(""):'<div class="empty">No attempts yet.</div>'}</div>`;
  }

  /* ---------- NOTEPAD ---------- */
  async function openNotes(){
    let content=""; try{ const {data}=await client.from("notes").select("content").eq("user_id",me.id).single(); content=data?.content||""; }catch(e){}
    const m=document.createElement("div"); m.className="modal";
    m.innerHTML=`<div class="sheet"><button class="close" onclick="closeModal()">×</button><h3>Notepad</h3><p style="color:var(--muted);font-size:12.5px;margin:0 0 10px">Scratch space — tap Done to save.</p><textarea id="np" style="min-height:200px">${esc(content)}</textarea><button class="btn primary" style="margin-top:10px;width:100%" onclick="saveNotes()">Done</button></div>`;
    $("modal-root").appendChild(m);
  }
  async function saveNotes(){ const t=$("np").value; try{ await client.from("notes").upsert({user_id:me.id, content:t, updated_at:new Date().toISOString()},{onConflict:"user_id"}); }catch(e){} closeModal(); }

  /* ---------- utils ---------- */
  function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
  function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
  window.go=go; window.go2=go2; window.openQ=openQ; window.saveQ=saveQ; window.delQ=delQ;
  window.addSubject=addSubject; window.delSubject=delSubject; window.addTopic=addTopic; window.delTopic=delTopic;
  window.saveProfile=saveProfile; window.signOut=signOut;
  window.startQuiz=startQuiz; window.pick=pick; window.checkMulti=checkMulti; window.submitWritten=submitWritten;
  window.gradeWritten=gradeWritten; window.revealCard=revealCard; window.nextQ=nextQ; window.prevQ=prevQ;
  window.jump=jump; window.toggleFlag=toggleFlag; window.togglePause=togglePause; window.exitQuiz=exitQuiz;
  window.submitQuiz=submitQuiz; window.openNotes=openNotes; window.saveNotes=saveNotes;

  /* ---------- start ---------- */
  ensureClient(); if(!client) loadLib();
  </script>
</body>
</html>
